# ===============================================================
# NexT Theme Configuration (v8)
# Docs: https://theme-next.js.org/docs/
# ===============================================================

# ---------------------------------------------------------------
# Scheme Settings
# ---------------------------------------------------------------
scheme: Gemini
darkmode: true

# ---------------------------------------------------------------
# Menu Settings
# ---------------------------------------------------------------
menu:
  home: / || fa fa-home
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive

menu_settings:
  icons: true
  badges: false

# ---------------------------------------------------------------
# Sidebar Settings
# ---------------------------------------------------------------
sidebar:
  position: left
  display: post
  padding: 18
  offset: 12

avatar:
  url:
  rounded: true
  rotated: false

site_state: true

social:
  #GitHub: https://github.com/yourname || fab fa-github
  #E-Mail: mailto:yourname@gmail.com || fa fa-envelope

social_icons:
  enable: true
  icons_only: false
  transition: true

# Table of Contents
toc:
  enable: true
  number: true
  wrap: false
  expand_all: false
  max_depth: 6

# ---------------------------------------------------------------
# Footer Settings
# ---------------------------------------------------------------
footer:
  icon:
    name: fa fa-heart
    animated: true
    color: "#ff0000"
  powered: true
  beian:
    enable: false

# Creative Commons License
creative_commons:
  license: by-nc-sa
  sidebar: true
  post: true

# ---------------------------------------------------------------
# Post Settings
# ---------------------------------------------------------------
excerpt_description: true
read_more_btn: true

post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: true
    another_day: true
  categories: true

# Word count & reading time (requires hexo-symbols-count-time)
symbols_count_time:
  separated_meta: true
  item_text_post: true
  item_text_total: true
  awl: 2
  wpm: 275

tag_icon: true

post_navigation: left

# ---------------------------------------------------------------
# Custom Pages
# ---------------------------------------------------------------
tagcloud:
  min: 12
  max: 30
  start: "#ccc"
  end: "#111"
  amount: 200

# ---------------------------------------------------------------
# Misc Theme Settings
# ---------------------------------------------------------------
text_align:
  desktop: justify
  mobile: justify

mobile_layout_economy: false

codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  prism:
    light: prism
    dark: prism-dark
  copy_button:
    enable: true
    style: mac

back2top:
  enable: true
  sidebar: true
  scrollpercent: true

reading_progress:
  enable: true
  position: top
  color: "#37c6c0"
  height: 3px

bookmark:
  enable: true
  color: "#222"
  save: auto

# ---------------------------------------------------------------
# Font Settings
# ---------------------------------------------------------------
font:
  enable: false
  host:
  global:
    external: true
    family: Lato
    size:

# ---------------------------------------------------------------
# SEO Settings
# ---------------------------------------------------------------
index_with_subtitle: false
exturl: false

# ---------------------------------------------------------------
# Third Party: Image Zoom
# ---------------------------------------------------------------
mediumzoom: true

# ---------------------------------------------------------------
# Comments Settings
# ---------------------------------------------------------------
comments:
  style: tabs
  active:
  storage: true
  lazyload: false

# ---------------------------------------------------------------
# Search (requires hexo-generator-searchdb)
# ---------------------------------------------------------------
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 3
  unescape: false
  preload: true

# ---------------------------------------------------------------
# Animation Settings
# ---------------------------------------------------------------
motion:
  enable: true
  async: false
  transition:
    post_block: fadeIn
    post_header: slideDownIn
    post_body: slideDownIn
    coll_header: slideLeftIn
    sidebar: slideUpIn
