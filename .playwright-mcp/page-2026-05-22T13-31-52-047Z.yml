  - generic [ref=e3]:
    - figure "车轮尚未落下，压力已经在纸面上投影。" [ref=e4]:
      - img "巨轮压在书桌上" [ref=e5]
      - generic [ref=e6]: 车轮尚未落下，压力已经在纸面上投影。
    - heading "序" [level=2] [ref=e7]
    - paragraph [ref=e8]: 这本书的出现，纯属意外。
    - paragraph [ref=e9]: 在饭堂门口的小图书馆偶然瞥见这本赫尔曼·黑塞的书，因为此前读过他写的《悉达多》，便顺手带走了。花了大约半个晚上，一口气读完。读罢却觉得，这种相遇冥冥中自有缘分。
    - figure "在一切开始之前，他也只是一个会去河边坐一会儿的少年。" [ref=e10]:
      - img "河边少年" [ref=e11]
      - generic [ref=e12]: 在一切开始之前，他也只是一个会去河边坐一会儿的少年。
    - paragraph [ref=e13]: 虽然这是黑塞以自身经历为蓝本创作的半自传体作品，但它对一位重点学校重点班学生——从入学、到崩溃、到离世——这整个过程的刻画，至今仍有深刻的启发意义。
    - heading "小镇做题家--《在轮下》" [level=2] [ref=e14]
    - paragraph [ref=e15]: 正好我自己的孩子也在小升初阶段。在这个节点上，我们还是让他参加了许多课外班——毕竟，大家都希望给孩子最好的教育。
    - paragraph [ref=e16]: 黑塞在《在轮下》里，描绘的正是同样的逻辑。在他笔下的那个德国县城，只有考试最优异的人，才能进入神学院——也就是当时意义上的"重点高中"。彼时的知识掌握在神权手中，神学院便是那个时代最高等的教育机构。跨过这道门槛，才有机会通向更高的学府。
    - figure "门槛越窄，身后的目光越重。" [ref=e17]:
      - img "考试之门" [ref=e18]
      - generic [ref=e19]: 门槛越窄，身后的目光越重。
    - paragraph [ref=e20]: 主人公汉斯，正是那个时代的"小镇做题家"：以全县第一的成绩参加邦试，最终考取第二名。一百一十八名考生竞争，只录取三十六人。
    - paragraph [ref=e21]: 书的开头，是一个成绩优异、却仍会去河边钓鱼、亲近自然的少年。他不只会读书，也懂得放松，懂得与天地为伴。
    - heading "轮子开始转动" [level=3] [ref=e22]
    - paragraph [ref=e23]: 然而进入毛尔布隆神学院后，一切开始变化。
    - figure "制度最擅长把不同的人排成同一种形状。" [ref=e24]:
      - img "神学院宿舍网格" [ref=e25]
      - generic [ref=e26]: 制度最擅长把不同的人排成同一种形状。
    - paragraph [ref=e27]: 三十六名学生，个个来自各地的佼佼者。十四五岁，又正值青春叛逆期。汉斯起初成绩依然出众，但这种"优秀"，正在悄悄压制他内心真正的热爱。
    - paragraph [ref=e28]: 于是他结交了性格截然相反的挚友——海尔纳。海尔纳叛逆、有天赋、爱好文学，始终游离于规则之外。在海尔纳身上，汉斯看到了另一种活法。
    - figure "汉斯与海尔纳，像同一个人心里的两条路。" [ref=e29]:
      - img "一体两面的少年" [ref=e30]
      - generic [ref=e31]: 汉斯与海尔纳，像同一个人心里的两条路。
    - paragraph [ref=e32]: 两人越走越近，汉斯也逐渐发现：自己并不真的喜欢念书。他开始觉醒，成绩随之下滑。学校察觉后强行干涉，最终海尔纳被迫退学。
    - figure "同伴离开之后，空出来的不只是一个位置。" [ref=e33]:
      - img "空走廊与遗落物" [ref=e34]
      - generic [ref=e35]: 同伴离开之后，空出来的不只是一个位置。
    - paragraph [ref=e36]: 失去挚友之后，汉斯一落千丈。他愈发努力，却愈发无望。最终，他以"神经衰弱"的状态离开了学校。
    - heading "归来的重量" [level=3] [ref=e37]
    - paragraph [ref=e38]: 回到家乡，又能做什么呢？
    - paragraph [ref=e39]: 曾经的老师、牧师，态度已经转变——这孩子，不可救药了。而他去钟表厂做学徒工，本身也成了一则新闻：你看，那个全县成绩最好的孩子，回来做钟表厂的工人了。书中以这份工作，指向了工业革命中涌现的新兴工种——一种"进步但卑微"的出路。无形的压力，无处不在。
    - figure "齿轮继续转动，人生却未必因此找到方向。" [ref=e40]:
      - img "钟表工坊" [ref=e41]
      - generic [ref=e42]: 齿轮继续转动，人生却未必因此找到方向。
    - paragraph [ref=e43]: 后来他遇到了心仪的姑娘，短暂燃起了一点生的兴味。可那姑娘没有任何说明，突然离开了。
    - paragraph [ref=e44]: 最后一次放纵的酒会后，他在回家路上失足落入河中，就此离开了这个世界。
    - figure "最后的沉默，不需要画得更响。" [ref=e45]:
      - img "夜河" [ref=e46]
      - generic [ref=e47]: 最后的沉默，不需要画得更响。
    - heading "一体两面" [level=3] [ref=e48]
    - paragraph [ref=e49]: 《在轮下》的深刻之处，在于汉斯和海尔纳这两个角色本质上是一体两面：
    - paragraph [ref=e50]:
      - strong [ref=e51]: 汉斯
      - text: ，代表那个被考试与期待压垮的自我；
      - strong [ref=e52]: 海尔纳
      - text: ，代表那个渴望逃离、渴望写诗、渴望自由与反抗的自我。
    - paragraph [ref=e53]: 黑塞的家庭是虔敬主义新教背景，父母期望他走神学教育的"正统"道路。但黑塞内心强烈渴望成为诗人、作家。这不是普通的青春期叛逆，而是"我要成为我自己"与"你必须成为我们期待的人"之间，一场根本性的冲突。
    - paragraph [ref=e54]: 现实中，黑塞逃学——某种意义上，正是海尔纳那一面，压过了汉斯那一面。
    - paragraph [ref=e55]: 代价很重。他并非潇洒地走向自由，而是先坠入了一场精神危机，有过自杀的念头，被送进了精神疗养所。之后辗转做过钟表厂学徒，又在图宾根一家书店找到了店员的工作，才算慢慢安定下来。在那段孤独阅读的日子里，他开始动笔写作。
    - paragraph [ref=e56]: 学校系统判定他失败，但他把"我不适合这条路"，改写成了"我必须走另一条路"。
    - paragraph [ref=e57]: 汉斯没有找到制度之外的生命形式；黑塞找到了。这才是两人命运分叉的真正原因。
    - heading "压垮，还是萌芽？" [level=3] [ref=e58]
    - paragraph [ref=e59]: 书中有一段话，我认为是黑塞真正想说的：
    - blockquote [ref=e60]: "\"树被砍掉了主杆之后，会在根旁萌发新芽，同样，在患了病和被摧残之后，人的心灵往往会回到春天般的萌芽时期和充满遐想的童年，好像它能在那里发现新的希望，把被扯断的生命线重新连接起来似的。这些根部萌发的枝条虽然茂盛多汁，生长迅速，但这种生命只是表象，它永远也不会再长成为一棵真正的树。\""
    - figure "被砍断之后冒出的新芽，未必能重新长成一棵树。" [ref=e61]:
      - img "根部新芽" [ref=e62]
      - generic [ref=e63]: 被砍断之后冒出的新芽，未必能重新长成一棵树。
    - paragraph [ref=e64]: 这段话出现在小说中间，却已预示了汉斯的结局：回到家乡，重新思考生活，找到新工作，遇见爱情……但在接二连三的打击之后，他还是悄然离开了这个世界。
    - paragraph [ref=e65]: 《在轮下》的书名，说的正是这件事：人被学校、家庭、成绩、荣誉、宗教伦理、社会期待，一层层压到车轮之下。
    - heading "人外有人，然后呢？" [level=3] [ref=e66]
    - paragraph [ref=e67]: 比尔·盖茨在自传里写过：上大学后，他遇到了数学远比自己厉害的人，即便自认已经很强，仍然相形见绌。于是他选择放弃那条路，转而寻找真正属于自己的方向。
    - paragraph [ref=e68]: 很多聪明人能够重新调整状态，恰恰是因为他们接受了"人外有人"的事实，转而挖掘自己真正热爱的东西。有人在大学完成这个转变，有人在中学。但也有人，始终无法接受这种落差，也找不到另一条路。汉斯如此，当年的黑塞亦然——只不过，黑塞最终找到了出口。
    - paragraph [ref=e69]:
      - text: 对于孩子来说，这段"从优秀生到人"的蜕变，其实是一条真实的英雄之路：
      - strong [ref=e70]: 先接受自己的平庸
      - text: ，承认与最优秀的人有差距；
      - strong [ref=e71]: 再找到自己的方向
      - text: ，不是别人期待你去的方向，而是内心真正热爱的东西；
      - strong [ref=e72]: 最后通过学习和真实的经历
      - text: ，慢慢找到一份能活下去的工作，走回社会，站稳脚跟。
    - paragraph [ref=e73]: 这个过程，痛苦，漫长，且无人可以代劳。
    - paragraph [ref=e74]: 而在这条路上，同伴的陪伴与认同，往往比我们以为的更重要。与异性朋友的交往也是如此——它们不是点缀，而是支撑一个人走过最难那段路的真实力量。汉斯恰恰两者都失去了：挚友被驱逐，爱情无声消失，他就这样彻底孤立无援。
    - heading "结语" [level=2] [ref=e75]
    - paragraph [ref=e76]: 只要孩子能够正确认识社会，找到一份能活下去的工作，其他的事才有资格谈。
    - paragraph [ref=e77]: 孩子必须知道世界是什么样的、存在什么、以及它是怎么运作的。学校要帮助他们理解世界、搭建自己与人类思想之间的桥梁——虽然这些能力目前主要以成绩和学位的形式呈现，但本质上，我们终究是要离开学校、回到社会上的。
    - paragraph [ref=e78]:
      - text: 所以在这个时候读《在轮下》，它给我最深的提醒，不是"别给孩子太大压力"这么简单——而是：
      - strong [ref=e79]: 我们能不能在他跌落的那一天，还在他身边；能不能让他在找到自己之前，不至于彻底孤立无援。
    - figure "跌落的那一刻，旁边是否还有人。" [ref=e80]:
      - img "伸向孩子的手" [ref=e81]
      - generic [ref=e82]: 跌落的那一刻，旁边是否还有人。
    - paragraph [ref=e83]: 那，才是父母真正能做的事。